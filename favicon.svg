<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock face -->
  <circle cx="32" cy="32" r="30" fill="#FFFBF3" stroke="#EADDC7" stroke-width="3"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="3 4" opacity=".5"/>
  <!-- Hour marks -->
  <g stroke="#8B5E3C" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="6" x2="32" y2="10"/>
    <line x1="32" y1="54" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="10" y2="32"/>
    <line x1="54" y1="32" x2="58" y2="32"/>
  </g>
  <!-- 12, 3, 6, 9 -->
  <g font-family="sans-serif" font-weight="bold" font-size="9" fill="#5B3A29" text-anchor="middle">
    <text x="32" y="17">12</text>
    <text x="50" y="35">3</text>
    <text x="32" y="54">6</text>
    <text x="14" y="35">9</text>
  </g>
  <!-- Hour hand (pointing to 10) -->
  <line x1="32" y1="34" x2="20" y2="18" stroke="#5B3A29" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 12) -->
  <line x1="32" y1="36" x2="32" y2="10" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#5B3A29"/>
  <circle cx="32" cy="32" r="1.5" fill="#FFE58A"/>
</svg>
